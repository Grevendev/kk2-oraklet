name: Oraklet CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Tvingar fram Node 24 för alla actions

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # 1. Backend (Python/uv)
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync Backend
        run: uv sync
      - name: Run Python Tests
        run: uv run pytest tests/
        
      # 2. Frontend (Node/Vite)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Uppgraderad till 22 för bättre framtidssäkerhet
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci # Använd 'npm ci' istället för 'npm install' i CI!

      - name: Lint Frontend
        run: cd frontend && npm run lint
        
      - name: Run Frontend Tests
        run: cd frontend && npm test
        
      - name: Build Frontend
        run: cd frontend && npm run build
        
      # 3. Artifacts
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: oraklet-frontend-build
          path: frontend/dist/
          retention-days: 7